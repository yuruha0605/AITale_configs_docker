server:
  port: 8080

spring:
  kafka:
    bootstrap-servers: localhost:9092
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://localhost:3306/learning?useSSL=false&serverTimezone=UTC
    username: root
    password: 123456789
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MariaDBDialect

springfox:
  documentation:
    swagger-ui:
      enabled: true

eureka:
  client:
    enabled: true
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka/

ai:
  service:
    url: http://localhost:9000

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh,busrefresh
