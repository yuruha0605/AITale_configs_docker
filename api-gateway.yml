server:
  port: 8080

spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: 
              - 'http://localhost:3000'
            allowedMethods: '*'
            allowedHeaders: '*'
            exposedHeaders: '*'
            allowCredentials: true
      routes:
        - id: user-service
          predicates:
            - Path=/user-service/**
          filters:
            - StripPrefix=1
          uri: lb://user-service

        - id: story-service
          predicates:
            - Path=/story-service/**
          filters:
            - StripPrefix=1
          uri: lb://story-service

        - id: learning-service
          predicates:
            - Path=/learning-service/**
          filters:
            - StripPrefix=1
          uri: lb://learning-service

        - id: gamification-service
          predicates:
            - Path=/gamification-service/**
          filters:
            - StripPrefix=1
          uri: lb://gamification-service

        - id: analytics-service
          predicates:
            - Path=/analytics-service/**
          filters:
            - StripPrefix=1
          uri: lb://analytics-service

        - id: recommendation-service
          predicates:
            - Path=/recommendation-service/**
          filters:
            - StripPrefix=1
          uri: lb://recommendation-service

jwt:
  secret: aitale-super-secret-key-for-miniproj-123456789

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    urls:
      - name: api-gateway
        url: /v3/api-docs
      - name: user-service
        url: /user-service/v3/api-docs
      - name: story-service
        url: /story-service/v3/api-docs
      - name: learning-service
        url: /learning-service/v3/api-docs
      - name: gamification-service
        url: /gamification-service/v3/api-docs
      - name: analytics-service
        url: /analytics-service/v3/api-docs
      - name: recommendation-service
        url: /recommendation-service/v3/api-docs